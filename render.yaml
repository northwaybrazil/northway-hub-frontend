services:
  - type: web
    name: northway-hub-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://northway-hub-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
